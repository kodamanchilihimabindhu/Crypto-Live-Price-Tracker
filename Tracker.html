<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Live Price Tracker</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: white;
        text-align: center;
        padding: 30px;
    }

    h1 {
        color: #00ff88;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 30px;
    }

    .card {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 12px;
        width: 220px;
        box-shadow: 0 0 10px rgba(0,255,136,0.2);
    }

    .price {
        font-size: 24px;
        font-weight: bold;
        color: #00ff88;
    }

    .change-positive {
        color: #00ff88;
    }

    .change-negative {
        color: #ff4d4d;
    }
</style>
</head>
<body>

<h1>🚀 Crypto Live Price Tracker</h1>

<div class="container" id="cryptoContainer">
    Loading...
</div>

<script>
async function fetchCryptoPrices() {
    try {
        const response = await fetch(
            "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=Ripple,Cardano,Polkadot,Litecoin"
        );

        const data = await response.json();

        const container = document.getElementById("cryptoContainer");

        container.innerHTML = data.map(coin => `
            <div class="card">
                <h2>${coin.name}</h2>
                <img src="${coin.image}" width="50" />
                <p class="price">$${coin.current_price.toLocaleString()}</p>
                <p class="${
                    coin.price_change_percentage_24h >= 0
                        ? 'change-positive'
                        : 'change-negative'
                }">
                    ${coin.price_change_percentage_24h.toFixed(2)}%
                </p>
            </div>
        `).join("");

    } catch (error) {
        console.error(error);
    }
}

// Initial load
fetchCryptoPrices();

// Refresh every 10 seconds
setInterval(fetchCryptoPrices, 10000);
</script>

</body>
</html>
